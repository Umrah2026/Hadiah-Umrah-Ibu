<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hadiah Umrah Untuk Ibu 🤍</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f8f3ef;
  color:#333;
}
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}
.card{
  background:white;
  border-radius:20px;
  padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  margin-bottom:20px;
}
h1{
  text-align:center;
  color:#b76e79;
}
.hero{
  text-align:center;
}
.hero img{
  width:220px;
  height:220px;
  object-fit:cover;
  border-radius:50%;
  border:6px solid #f4d9dd;
}
.progress{
  background:#eee;
  height:20px;
  border-radius:20px;
  overflow:hidden;
}
.bar{
  width:0%;
  height:100%;
  background:#d88996;
}
.bank{
  text-align:center;
  line-height:1.8;
}
.qr{
  width:250px;
  border-radius:20px;
}
.list{
  background:#fafafa;
  padding:12px;
  border-radius:12px;
  margin:10px 0;
  display:flex;
  justify-content:space-between;
}
</style>
</head>
<body>
<div class="container">

  <div class="card hero">
    <h1>Hadiah Umrah Untuk Ibu 🤍</h1>
    <img src="mak.jpg">
    <p><b>Puan Ruhana binti Abdul Hamid</b></p>
    <p>Semoga Allah permudahkan langkah ibu menjejak kaki ke Tanah Suci.</p>
  </div>

  <div class="card">
    <h2>Sasaran Kutipan: RM12,200</h2>
    <div class="progress">
      <div class="bar"></div>
    </div>
    <p>Jumlah terkumpul: <b>RM0</b></p>
  </div>

  <div class="card bank">
    <h2>Salurkan Sumbangan 🤍</h2>
    <p><b>Maybank</b></p>
    <p><b>1580 9782 1003</b></p>
    <p>Muhammad Aiman Fikri</p>
    <br>
    <img src="qr.jpg" class="qr">
  </div>

  <div class="card">
    <h2>Senarai Penyumbang</h2>
    <div class="list"><span>Belum ada</span><span>RM0</span></div>
  </div>

</div>
</body>
  </html>
